on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Important: Allows the bot to update posted_links.txt
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: os-actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install atproto requests

      - name: Execute Bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python crs_bot.py

      - name: Save Memory to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if [ -f posted_links.txt ]; then
            git add posted_links.txt
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update posted links [skip ci]" && git push)
          else
            echo "No new reports were posted; nothing to save."
          fi
